# version: '3.8'

# networks:
#   kong-net:
#     driver: bridge

services:
  kong-database:
    build: "./database"
    # image: postgres:13
    container_name: kong-database
    restart: always
    # networks:
    #   - kong-net
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    ports:
      - "5432:5432"
    volumes:
      - kong_postgres:/var/lib/postgresql/data

  kong-migration:
    build: "./api"
    # image: kong:3.4
    container_name: kong-migration
    depends_on:
      - kong-database
    # networks:
    #   - kong-net
    restart: "no"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap

  kong-gateway:
    build: "./api"
    # image: kong:3.4
    container_name: kong-gateway
    depends_on:
      - kong-migration
    # networks:
    #   - kong-net
    restart: always
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"   # Kong Proxy
      - "8443:8443"   # Kong Proxy SSL
      - "8001:8001"   # Kong Admin API
      - "8444:8444"   # Kong Admin API SSL
      - "8002:8002"   # Kong Manager

  kong-manager:
    build: "./manager"
    # image: pantsel/konga
    container_name: kong-manager
    depends_on:
      - kong-gateway
    # networks:
    #   - kong-net
    restart: always
    environment:
      NODE_ENV: production
      KONGA_HOOK_TIMEOUT: 120000

      # - DB_ADAPTER=postgres # Hoặc 'local' nếu bạn không muốn dùng DB cho Konga
      # - DB_HOST=kong-database
      # - DB_USER=kong
      # - DB_PASSWORD=kongpass
      # - DB_DATABASE=konga_db

      KONG_MANAGER_AUTH_USERNAME: vuvannghia.work@gmail.com
      KONG_MANAGER_AUTH_PASSWORD: vuvannghia.work@gmail.com


      KONGA_SEED_USER_DATA_SOURCE_FILE: /app/kongadata/uploads/user.data
      KONGA_SEED_KONG_NODE_DATA_SOURCE_FILE: /app/kongadata/uploads/node.data

      DECK_KONG_ADDR: http://kong-gateway:8001
      DECK_KONG_KEY_AUTH: vuvannghia


    volumes:
      - "./manager/data/user.data:/app/kongadata/uploads/user.data"
      - "./manager/data/node.data:/app/kongadata/uploads/node.data"
    ports:
      - ":1337"

volumes:
  kong_postgres: